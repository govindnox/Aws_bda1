# More information about the configuration file can be found here:
# https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html
version = 0.1

[default]
[default.global.parameters]
stack_name = "EnFin-AI-M0-Utility-Extraction"

[default.build.parameters]
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities       = "CAPABILITY_IAM"
confirm_changeset  = true
resolve_image_repos = true
s3_bucket          = "enfin-sam-artifacts"
s3_prefix          = "EnFin-AI-M0-Utility-Extraction"
region             = "us-west-2"
image_repositories = []
parameter_overrides = "Environment=\"Dev\" S3BucketName=\"enfin-sam-artifacts\" AutoAcceptThreshold=\"90\" DefaultProcess=\"m0_utility_bill\" SalesforceEnabled=\"false\" SalesforceTokenTableName=\"\" SalesforceHost=\"\" SalesforceInstanceUrl=\"\" SalesforceUsername=\"\" SalesforceSecretName=\"\" SalesforceApexPath=\"\" SalesforceQssQueueId=\"\""

[default.package.parameters]
resolve_image_repos = true
s3_bucket          = "enfin-sam-artifacts"
s3_prefix          = "EnFin-AI-M0-Utility-Extraction"
region             = "us-west-2"
image_repositories = []

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"

[Dev.deploy.parameters]
stack_name         = "EnFin-AI-M0-Utility-Extraction-Dev"
s3_bucket          = "enfin-milestone-docs"
s3_prefix          = "EnFin-AI-M0-Utility-Extraction"
region             = "us-west-2"
confirm_changeset  = true
capabilities       = "CAPABILITY_IAM"
resolve_image_repos = true
image_repositories = []
parameter_overrides = "Environment=\"Dev\" S3BucketName=\"enfin-milestone-docs-dev\" AutoAcceptThreshold=\"90\" DefaultProcess=\"m0_utility_bill\" SalesforceEnabled=\"false\" SalesforceTokenTableName=\"\" SalesforceHost=\"\" SalesforceInstanceUrl=\"\" SalesforceUsername=\"\" SalesforceSecretName=\"\" SalesforceApexPath=\"\" SalesforceQssQueueId=\"\""