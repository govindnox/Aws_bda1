AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Utility Bill Extraction Lambda - Docling + LLM (Bedrock Converse API)

Parameters:
  Environment:
    Type: String
    Default: Dev
    AllowedValues:
      - Dev-v1
      - Dev
      - Prod
    Description: Environment name

  S3BucketName:
    Type: String
    Description: S3 bucket containing utility bills

  # ==========================================================================
  # Extraction Configuration
  # ==========================================================================
  AutoAcceptThreshold:
    Type: Number
    Default: 95
    Description: Confidence threshold for auto-accept (in percentage)

  # ==========================================================================
  # Process Configuration
  # ==========================================================================
  DefaultProcess:
    Type: String
    Description: Default extraction process name
    Default: "m0_utility_bill"

  # ==========================================================================
  # Salesforce Configuration
  # ==========================================================================
  SalesforceEnabled:
    Type: String
    Description: Whether to enable Salesforce integration
    AllowedValues:
      - "true"
      - "false"
    Default: "true"

  SalesforceTokenTableName:
    Type: String
    Description: DynamoDB table name for Salesforce token management
    Default: ""

  SalesforceHost:
    Type: String
    Description: Salesforce host URL (e.g., login.salesforce.com)
    Default: ""

  SalesforceInstanceUrl:
    Type: String
    Description: Salesforce instance URL (e.g., https://yourorg.my.salesforce.com)
    Default: ""

  SalesforceUsername:
    Type: String
    Description: Salesforce integration username
    Default: ""

  SalesforceSecretName:
    Type: String
    Description: AWS Secrets Manager secret name for Salesforce credentials
    Default: ""

  SalesforceApexPath:
    Type: String
    Description: Salesforce Apex REST endpoint path
    Default: ""

  SalesforceQssQueueId:
    Type: String
    Description: Salesforce Queue ID for QSS review tasks
    Default: ""

Globals:
  Function:
    Timeout: 600
    MemorySize: 6144

Resources:
  # ==========================================================================
  # DynamoDB Table for Extraction Results
  # ==========================================================================
  ExtractionResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub EnFin_AI_M0_Utility_Extraction_${Environment}
      AttributeDefinitions:
        - AttributeName: extraction_id
          AttributeType: S
        - AttributeName: project_id
          AttributeType: S
        - AttributeName: requires_review
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: extraction_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: project_id-index
          KeySchema:
            - AttributeName: project_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: requires_review-index
          KeySchema:
            - AttributeName: requires_review
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: utility-extraction

  # ==========================================================================
  # SQS Queue for triggering extraction
  # ==========================================================================
  ExtractionQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub EnFin_AI_M0_Utility_Extraction_Queue_${Environment}.fifo
      FifoQueue: true
      ContentBasedDeduplication: true
      VisibilityTimeout: 720  # 12 minutes (> Lambda timeout of 600s)
      MessageRetentionPeriod: 604800  # 7 days
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ExtractionDLQ.Arn
        maxReceiveCount: 3

  # Dead Letter Queue (FIFO)
  ExtractionDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub EnFin_AI_M0_Utility_Extraction_DLQ_${Environment}.fifo
      FifoQueue: true
      ContentBasedDeduplication: true
      MessageRetentionPeriod: 1209600  # 14 days

  # ==========================================================================
  # Bedrock Prompt for Extraction
  # ==========================================================================
  ExtractionPrompt:
    Type: AWS::Bedrock::Prompt
    Properties:
      Name: !Sub EnFin_AI_M0_Utility_Extraction_Prompt
      Description: Utility bill extraction prompt - Docling text + multimodal LLM
      DefaultVariant: default
      Variants:
        - Name: default
          ModelId: us.meta.llama4-maverick-17b-instruct-v1:0
          TemplateType: TEXT
          TemplateConfiguration:
            Text:
              Text: |
                <system>
                The page images of the utility bill document are provided above.

                ## DOCUMENT TEXT (Extracted by Docling - format-preserving, high accuracy for text/numbers):
                {{docling_text}}

                ## YOUR TASK:
                You are analyzing a utility bill document. You have TWO sources of information:
                1. **Page Images** (above) - Use these to detect layout, identify sections, logos, and locate where each field is on the page
                2. **Docling Text** (above) - Use this for the exact text values. Docling text is MORE RELIABLE than visual reading for exact digits and characters.

                ## STEP 1: IDENTIFY THE UTILITY PROVIDER
                Examine the page images for logos, headers, and contact information. Also check the Docling text for company names.

                ### KNOWN UTILITIES:
                - **California**: PG&E (Pacific Gas & Electric), SCE (Southern California Edison), SDG&E (San Diego Gas & Electric)
                - **Illinois**: ComED (Commonwealth Edison), Ameren Illinois

                If the document is NOT a utility bill or is from an unsupported utility, set utility_provider to "Not_Utility_Bill" or the utility name and return empty fields.

                ## STEP 2: EXTRACT REQUIRED FIELDS
                Based on the identified utility, extract the required fields.

                {{utility_fields_guide}}

                ## EXTRACTION PROCESS:
                For EACH required field:
                1. **Visual Location**: Use the page images to identify WHERE the field is (which page, which section, near which label)
                2. **Value from Docling**: Find the corresponding value in the Docling text (search near the expected labels)
                3. **Cross-check**: Confirm the Docling text value matches what you see in the image
                4. **Return Docling value**: Always prefer the Docling text value (more reliable for exact digits)

                ### UTILITY-SPECIFIC GUIDE:
                - **PG&E**: Account No is top-right of page 1 (can have check digit like 4479518448-8). Service Agreement ID (10 digits) and Meter # (10 digits) are on page 3 or 4 in 'Service Information' or 'Details of Electric Charges'.
                - **SCE**: Customer account (12 digits) and Service account (10 digits) are top-left of page 1. Smart Meter number (starts with 222) is on page 3 under 'Your past and current electricity usage'.
                - **SDG&E**: Account Number (has spaces like 0090 5273 6230 2) is at the top of page 3. Meter Number (8 digits, may start with 0) is on page 3 in 'Detail of Current Charges'.
                - **ComEd**: Account Number (10 digits) is at the top. Electric Choice ID (10 digits) is in 'SERVICE ADDRESS' box. Meter Number (8-9 digits) is in 'METER INFORMATION' table.
                - **Ameren**: Account Number (10 digits) is top-left of page 1. Meter Number (8-9 digits) is on page 3 in 'Electric Service Residential Billing Detail' table.

                <reasoning>
                **Utility Identification**:
                - What logo/company name do I see in the images?
                - What company name appears in the Docling text?
                - What state indicators are present?
                - Is this a supported utility?

                **Field-by-Field Extraction**:
                For each field:
                1. Visual: I see [field label] on page [N] in section [section]. The value appears to be [visual_value].
                2. Docling: Searching Docling text near "[label]"... Found: [docling_value]
                3. Cross-check: Visual=[visual_value], Docling=[docling_value] -> [match/mismatch]
                4. Final value: [value] (source: docling/visual)

                **Confidence Assessment**:
                - CERTAIN: Value found in both image AND Docling text, they match
                - LIKELY: Value found in Docling text near expected label, image confirms location
                - UNCERTAIN: Value found but cross-check is inconclusive
                - NOT_FOUND: Could not locate the field in either source
                </reasoning>

                <output>
                {
                  "utility_provider": "PG&E|SCE|SDG&E|ComED|Ameren|<Other>|Not_Utility_Bill",
                  "state": "CA|IL|<Other>|Unknown",
                  "is_supported_document": true|false,
                  "no_relevant_pages_reason": null,
                  "fields": {
                    "field_name": {
                      "value": "extracted_value_or_null",
                      "page": page_number,
                      "section": "section/label where found",
                      "confidence": "CERTAIN|LIKELY|UNCERTAIN|NOT_FOUND",
                      "reasoning": "brief explanation of how value was found and cross-checked"
                    }
                  }
                }
                </output>
                </system>
              InputVariables:
                - Name: docling_text
                - Name: utility_fields_guide
          InferenceConfiguration:
            Text:
              Temperature: 0
              TopP: 0.7
              MaxTokens: 4096

  # ==========================================================================
  # Lambda Function (Docker Container)
  # ==========================================================================
  ExtractionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EnFin_AI_M0_Utility_Extraction_${Environment}
      PackageType: Image
      Description: Extracts utility bill data using Docling + LLM (Bedrock Converse API)
      ImageConfig:
        Command: ["lambda_function.lambda_handler"]
      EphemeralStorage:
        Size: 4096  # 4 GB for OCR model downloads to /tmp/
      Environment:
        Variables:
          # AWS Configuration
          REGION: !Ref AWS::Region
          S3_BUCKET: !Ref S3BucketName
          DYNAMODB_TABLE_NAME: !Ref ExtractionResultsTable

          # Confidence Thresholds
          AUTO_ACCEPT_THRESHOLD: !Sub "${AutoAcceptThreshold}"
          FLAG_THRESHOLD: "80"

          # Model Configuration
          EXTRACTION_MODEL: us.meta.llama4-maverick-17b-instruct-v1:0

          # OCR Configuration
          OCR_ENGINE: "easyocr"  # "easyocr" or "rapidocr"
          OCR_LANG: "en"
          FORCE_OCR: "true"  # Discard corrupt embedded text layers; OCR full page

          # LLM Image Batching (Llama 4 Maverick max = 3 images per call)
          MAX_IMAGES_PER_LLM_CALL: "3"

          # Bedrock Prompt Management IDs
          PROMPT_ID_EXTRACTION: !GetAtt ExtractionPrompt.Id

          # Process Configuration
          DEFAULT_PROCESS: !Ref DefaultProcess

          # Salesforce Configuration
          SF_ENABLED: !Ref SalesforceEnabled
          SF_TOKEN_TABLE_NAME: !Ref SalesforceTokenTableName
          SF_HOST: !Ref SalesforceHost
          SF_INSTANCE_URL: !Ref SalesforceInstanceUrl
          SF_USERNAME: !Ref SalesforceUsername
          SF_SECRET_NAME: !Ref SalesforceSecretName
          SF_APEX_PATH: !Ref SalesforceApexPath
          SF_QSS_QUEUE_ID: !Ref SalesforceQssQueueId
          SF_AUTH_PATH: "/services/oauth2/token"
          SF_TOKEN_DIFF_TIME: "300"

          # Salesforce Field Mappings
          SF_FIELD_METER_ID: "Meter_ID__c"
          SF_FIELD_ACCOUNT_NUMBER: "Utility_Account_Number__c"
          SF_FIELD_SERVICE_AGREEMENT_ID: "Service_Agreement_ID__c"
          SF_FIELD_ELECTRIC_CHOICE_ID: "Electric_Choice_ID__c"
          SF_FIELD_METER_NUMBER: "Meter_Number__c"
          SF_FIELD_CONFIDENCE: "Extraction_Confidence__c"
          SF_FIELD_NEEDS_VERIFICATION: "Needs_Manual_Verification__c"
          SF_FIELD_TIMESTAMP: "Last_Extraction_Date__c"
          SF_FIELD_STATUS: "Extraction_Status__c"

          # Logging
          LOG_LEVEL: INFO
          LOG_FULL_PROMPTS: "false"

      Policies:
        - Statement:
            - Sid: VisualEditor0
              Effect: Allow
              Action:
                - logs:CreateLogGroup
              Resource: arn:aws:logs:us-west-2:673522932440:*
            - Sid: VisualEditor1
              Effect: Allow
              Action:
                - secretsmanager:DescribeSecret
                - dynamodb:DeleteItem
                - sns:ListTopics
                - rekognition:DetectText
                - bedrock:ListPrompts
                - bedrock:GetPrompt
                - bedrock:InvokeModelWithResponseStream
                - sns:CheckIfPhoneNumberIsOptedOut
                - sns:GetDataProtectionPolicy
                - sns:ListEndpointsByPlatformApplication
                - logs:CreateLogStream
                - secretsmanager:GetSecretValue
                - dynamodb:GetItem
                - sns:ListTagsForResource
                - sns:ListSubscriptionsByTopic
                - sns:GetTopicAttributes
                - sns:ListSMSSandboxPhoneNumbers
                - dynamodb:PutItem
                - s3:*
                - bedrock:InvokeModel
                - sns:GetPlatformApplicationAttributes
                - dynamodb:UpdateItem
                - sns:GetSubscriptionAttributes
                - sns:ListSubscriptions
                - logs:PutLogEvents
                - sns:ListOriginationNumbers
                - sns:ListPhoneNumbersOptedOut
                - sns:GetEndpointAttributes
                - sns:GetSMSSandboxAccountStatus
                - sns:GetSMSAttributes
                - sns:ListPlatformApplications
              Resource: "*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
              Resource: arn:aws:logs:us-west-2:673522932440:*
            - Effect: Allow
              Action:
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: "*"

      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt ExtractionQueue.Arn
            BatchSize: 1  # Process one document at a time

    Metadata:
      DockerTag: latest
      DockerContext: .
      Dockerfile: Dockerfile

Outputs:
  ExtractionQueueUrl:
    Description: URL of the extraction SQS queue
    Value: !Ref ExtractionQueue

  ExtractionQueueArn:
    Description: ARN of the extraction SQS queue
    Value: !GetAtt ExtractionQueue.Arn

  ExtractionFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt ExtractionFunction.Arn

  ExtractionFunctionName:
    Description: Name of the Lambda function
    Value: !Ref ExtractionFunction

  DLQUrl:
    Description: URL of the Dead Letter Queue
    Value: !Ref ExtractionDLQ

  DynamoDBTableName:
    Description: Name of the DynamoDB table for extraction results
    Value: !Ref ExtractionResultsTable

  DynamoDBTableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt ExtractionResultsTable.Arn
